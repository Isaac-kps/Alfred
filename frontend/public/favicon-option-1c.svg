<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark navy background -->
  <rect width="32" height="32" rx="7" fill="#1a1a2e"/>
  <!-- Bat signal gold glow -->
  <circle cx="16" cy="16" r="12.5" fill="#e2c27d" opacity="0.12"/>
  <!-- Bat signal ring -->
  <circle cx="16" cy="16" r="12.5" fill="none" stroke="#e2c27d" stroke-width="1.8"/>
  <!-- Italic Palatino "A" — refined old-style (Palatino) -->
  <text x="16" y="22.5"
    font-family="'Palatino Linotype', Palatino, 'Book Antiqua', serif"
    font-size="19"
    font-style="italic"
    fill="#e2c27d"
    text-anchor="middle">A</text>
</svg>
