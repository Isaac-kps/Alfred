<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark navy background -->
  <rect width="32" height="32" rx="7" fill="#1a1a2e"/>
  <!-- Bat signal gold glow -->
  <circle cx="16" cy="16" r="12.5" fill="#e2c27d" opacity="0.12"/>
  <!-- Bat signal ring -->
  <circle cx="16" cy="16" r="12.5" fill="none" stroke="#e2c27d" stroke-width="1.8"/>
  <!-- Serif "A" — elegant butler (Georgia) -->
  <text x="16" y="22.5"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="18"
    font-weight="bold"
    fill="#e2c27d"
    text-anchor="middle">A</text>
</svg>
