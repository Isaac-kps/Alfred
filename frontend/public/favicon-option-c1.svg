<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark navy background -->
  <rect width="32" height="32" rx="7" fill="#1a1a2e"/>
  <!-- Magnifying glass lens glow -->
  <circle cx="13" cy="13" r="10" fill="#e2c27d" opacity="0.12"/>
  <!-- Magnifying glass lens ring -->
  <circle cx="13" cy="13" r="10" fill="none" stroke="#e2c27d" stroke-width="1.8"/>
  <!-- Magnifying glass handle -->
  <line x1="20.2" y1="20.2" x2="28" y2="28" stroke="#e2c27d" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Palatino Regular "A" centred in the lens -->
  <text x="13" y="18.5"
    font-family="'Palatino Linotype', Palatino, 'Book Antiqua', serif"
    font-size="16"
    font-weight="normal"
    font-style="normal"
    fill="#e2c27d"
    text-anchor="middle">A</text>
</svg>
